name: Build DNSTT Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Build arm64-v8a
        run: |
          export CGO_ENABLED=1
          export CC=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang
          GOOS=android GOARCH=arm64 go build -buildmode=c-shared -o build/libdnstt_arm64.so .

      - name: Build armeabi-v7a
        run: |
          export CGO_ENABLED=1
          export CC=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang
          GOOS=android GOARCH=arm go build -buildmode=c-shared -o build/libdnstt_arm.so .

      - name: Build x86_64
        run: |
          export CGO_ENABLED=1
          export CC=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android21-clang
          GOOS=android GOARCH=amd64 go build -buildmode=c-shared -o build/libdnstt_x86_64.so .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dnstt-android-libs
          path: build/
